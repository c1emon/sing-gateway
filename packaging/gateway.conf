# sing-gateway defaults. Installing the package is inert; run
# `sing-gateway enable` explicitly to install the sing-box.service drop-in.

# Optional explicit sing-box source. If unset, sing-gateway inspects
# sing-box.service and then falls back to /etc/sing-box/config.json if present.
# SING_BOX_CONFIG_FILE=/etc/sing-box/config.json
# SING_BOX_CONFIG_DIR=/etc/sing-box/config.d

# TProxy selection. Set TPROXY_INBOUND_TAG when multiple tproxy inbounds exist.
# TPROXY_INBOUND_TAG=proxy-in
# TPROXY_PORT=9898

STACK=v4
NF_TABLE=transparent_proxy
ROUTE_TABLE4=100
ROUTE_TABLE6=106
ROUTE_MARK=0x01

# FakeIP ranges can be inferred from sing-box dns.fakeip inet ranges.
# FAKEIP_V4=198.18.0.0/15
# FAKEIP_V6=fc00::/18

HIJACK_DNS=0
PROXY_LOCAL=0
# IGNORE_MARK=0x20
# IGNORE_UID=990
